<script>

// ========================= 
// DOM ELEMENTS
// ========================= 

const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("sidebarBackdrop");
const closeSidebar = document.getElementById("closeSidebar");
const transferForm = document.getElementById("transferForm");
const submitBtn = document.getElementById("submitBtn");
const alertMessage = document.getElementById("alertMessage");

// ========================= 
// SIDEBAR FUNCTIONS
// ========================= 

menuBtn.addEventListener("click", () => {
  sidebar.classList.remove("-translate-x-full");
  backdrop.classList.remove("hidden");
});

function closeMenu() {
  sidebar.classList.add("-translate-x-full");
  backdrop.classList.add("hidden");
}

closeSidebar.addEventListener("click", closeMenu);
backdrop.addEventListener("click", closeMenu);

// ========================= 
// ALERT FUNCTIONS
// ========================= 

function showAlert(message, type = 'info') {
  alertMessage.textContent = message;
  alertMessage.className = `alert alert-${type}`;
  alertMessage.style.display = 'block';
  
  setTimeout(() => {
    alertMessage.style.display = 'none';
  }, 5000);
}

function hideAlert() {
  alertMessage.style.display = 'none';
}

/* =========================================================
   API URL
========================================================= */

const API_URL =
"http://localhost/basic/work/public/transfers.php";

/* =========================================================
   GLOBAL
========================================================= */

let editTransferId = null;

/* =========================================================
   ALERT
========================================================= */

function showAlert(
    icon,
    title,
    text
){

    Swal.fire({

        icon,
        title,
        text,

        background:"#1e293b",
        color:"#fff",

        confirmButtonColor:
        icon === "success"
        ? "#2563eb"
        : "#ef4444"

    });

}

/* =========================================================
   LOAD WEBSITE
========================================================= */

async function loadWebsites(){

    try{

        const response =
        await fetch(
            "http://localhost/basic/work/public/websites.php"
        );

        if(!response.ok){

            throw new Error(
                "โหลดเว็บไซต์ไม่สำเร็จ"
            );

        }

        const result =
        await response.json();

        let html =
        `<option value="">-- เลือกเว็บไซต์ --</option>`;

        if(result.success){

            result.data.forEach(row => {

                html += `
                <option value="${row.website_id}">
                    ${row.website_name}
                </option>
                `;

            });

        }

        document.getElementById(
            "website_id"
        ).innerHTML = html;

    }catch(error){

        console.log(error);

        showAlert(
            "error",
            "ผิดพลาด",
            "โหลดเว็บไซต์ไม่สำเร็จ"
        );

    }

}

/* =========================================================
   LOAD BANKS
========================================================= */

async function loadBanks(){

    try{

        const response =
        await fetch(
        "http://localhost/basic/work/public/bank_accounts.php"
        );

        const result =
        await response.json();

        let html =
        `
        <option value="">
            -- เลือกบัญชี --
        </option>
        `;

        if(result.success){

            result.data.forEach(bank => {

                html += `
                <option value="${bank.bank_id}">
                    ${bank.bank_name}
                    -
                    ${bank.bank_number}
                </option>
                `;

            });

        }

        document.getElementById("from_bank_id").innerHTML =
        html;

        document.getElementById("to_bank_id").innerHTML =
        html;

    }catch(error){

        console.log(error);

    }

}

loadBanks();

/* =========================================================
   LOAD USERS
========================================================= */

async function loadUsers() {

  try {

    const response =
    await fetch(
      "http://localhost/basic/work/public/users.php"
    );

    if (!response.ok) {

      throw new Error(
        "โหลดผู้ใช้ไม่สำเร็จ"
      );

    }

    const result =
    await response.json();

    console.log(result);

    let html = `
      <option value="">
        -- เลือกผู้ทำรายการ --
      </option>
    `;

    if (
      result.success &&
      result.data.length > 0
    ) {

      result.data.forEach(user => {

        html += `
          <option value="${user.user_id}">
            ${user.full_name}
          </option>
        `;

      });

    }

    document.getElementById("user_id")
    .innerHTML = html;

  } catch (error) {

    console.log(error);

    showNotification(
      "error",
      "ผิดพลาด",
      "โหลดข้อมูลผู้ใช้ไม่สำเร็จ"
    );

  }

}

/* =========================================================
   NOTIFICATION SYSTEM
========================================================= */

// Create notification container if it doesn't exist
function initNotifications() {
  if (!document.getElementById('notificationContainer')) {
    const container = document.createElement('div');
    container.id = 'notificationContainer';
    container.style.cssText = `
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 1000;
      max-width: 400px;
    `;
    document.body.appendChild(container);
  }
}

// Show notification
function showNotification(type, title, message, duration = 5000) {
  initNotifications();

  const container = document.getElementById('notificationContainer');
  
  // Color scheme based on type
  const colors = {
    success: {
      bg: '#065f46',
      border: '#10b981',
      icon: 'bx-check-circle',
      color: '#d1fae5'
    },
    error: {
      bg: '#7c2d12',
      border: '#ea580c',
      icon: 'bx-x-circle',
      color: '#fed7aa'
    },
    warning: {
      bg: '#78350f',
      border: '#f59e0b',
      icon: 'bx-exclamation-circle',
      color: '#fef3c7'
    },
    info: {
      bg: '#0c4a6e',
      border: '#0ea5e9',
      icon: 'bx-info-circle',
      color: '#cffafe'
    }
  };

  const config = colors[type] || colors.info;

  // Create notification element
  const notification = document.createElement('div');
  notification.className = 'notification';
  notification.style.cssText = `
    background: ${config.bg};
    border: 1px solid ${config.border};
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    animation: slideInRight 0.3s ease-out;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    color: ${config.color};
  `;

  // Icon
  const icon = document.createElement('i');
  icon.className = `bx ${config.icon}`;
  icon.style.cssText = `
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  `;

  // Content
  const content = document.createElement('div');
  content.style.cssText = `
    flex: 1;
    min-width: 0;
  `;

  const titleEl = document.createElement('h3');
  titleEl.textContent = title;
  titleEl.style.cssText = `
    margin: 0 0 4px 0;
    font-size: 15px;
    font-weight: 600;
  `;

  const messageEl = document.createElement('p');
  messageEl.textContent = message;
  messageEl.style.cssText = `
    margin: 0;
    font-size: 14px;
    opacity: 0.9;
  `;

  content.appendChild(titleEl);
  content.appendChild(messageEl);

  // Close button
  const closeBtn = document.createElement('button');
  closeBtn.innerHTML = '<i class="bx bx-x"></i>';
  closeBtn.style.cssText = `
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 20px;
    padding: 0;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.2s;
  `;

  closeBtn.onmouseover = () => closeBtn.style.opacity = '1';
  closeBtn.onmouseout = () => closeBtn.style.opacity = '0.7';

  closeBtn.onclick = () => {
    notification.style.animation = 'slideOutRight 0.3s ease-out';
    setTimeout(() => notification.remove(), 300);
  };

  notification.appendChild(icon);
  notification.appendChild(content);
  notification.appendChild(closeBtn);

  container.appendChild(notification);

  // Auto remove after duration
  if (duration > 0) {
    setTimeout(() => {
      if (notification.parentElement) {
        notification.style.animation = 'slideOutRight 0.3s ease-out';
        setTimeout(() => notification.remove(), 300);
      }
    }, duration);
  }
}

// Alias for backward compatibility
function showAlert(type, title, message) {
  showNotification(type, title, message);
}

/* =========================================================
   ADD ANIMATIONS TO STYLESHEET
========================================================= */

// Add CSS animations
function addNotificationStyles() {
  if (!document.getElementById('notificationStyles')) {
    const style = document.createElement('style');
    style.id = 'notificationStyles';
    style.textContent = `
      @keyframes slideInRight {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOutRight {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      .notification {
        word-break: break-word;
      }

      @media (max-width: 768px) {
        #notificationContainer {
          right: 10px !important;
          left: 10px !important;
          max-width: none !important;
        }
      }
    `;
    document.head.appendChild(style);
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  addNotificationStyles();
});

async function saveTransfer(event) {

  event.preventDefault();

  try {

    const saveBtn =
    document.getElementById("submitBtn");

    saveBtn.disabled = true;

    saveBtn.innerHTML =
    '<i class="bx bx-loader-circle bx-spin mr-2"></i>กำลังบันทึก...';

    if (!validateTransferForm()) {

      saveBtn.disabled = false;

      saveBtn.innerHTML =
      '<i class="bx bx-check-circle mr-2"></i>ยืนยันรายการ';

      return;

    }

    const formData = {

      website_id:
      document.getElementById("website_id").value,

      from_bank_id:
      document.getElementById("from_bank_id").value,

      to_bank_id:
      document.getElementById("to_bank_id").value,

      amount:
      document.getElementById("amount").value,

      transfer_type:
      document.getElementById("transfer_type").value,

      transfer_status:
      document.getElementById("transfer_status").value,

      user_id:
      document.getElementById("user_id").value,

      note:
      document.getElementById("note").value

    };

    const response =
    await fetch(API_URL, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(formData)

    });

    const text =
    await response.text();

    console.log(text);

    let result;

    try {

      result = JSON.parse(text);

    } catch {

      throw new Error(
        "API ส่งข้อมูลไม่ถูกต้อง"
      );

    }

    if (result.success) {

      showNotification(
        "success",
        "สำเร็จ",
        result.message
      );

      transferForm.reset();

    } else {

      showNotification(
        "error",
        "ผิดพลาด",
        result.message
      );

    }

  } catch (error) {

    console.log(error);

    showNotification(
      "error",
      "เกิดข้อผิดพลาด",
      error.message
    );

  } finally {

    const saveBtn =
    document.getElementById("submitBtn");

    saveBtn.disabled = false;

    saveBtn.innerHTML =
    '<i class="bx bx-check-circle mr-2"></i>ยืนยันรายการ';

  }

}

function validateTransferForm() {
  const websiteId = document.getElementById("website_id").value;
  const fromBankId = document.getElementById("from_bank_id").value;
  const toBankId = document.getElementById("to_bank_id").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const transferType = document.getElementById("transfer_type").value;

  if (!websiteId) {
    showNotification("warning", "⚠ ขาดข้อมูล", "กรุณาเลือกเว็บไซต์");
    return false;
  }

  if (!fromBankId) {
    showNotification("warning", "⚠ ขาดข้อมูล", "กรุณาเลือกบัญชีต้นทาง");
    return false;
  }

  if (!toBankId) {
    showNotification("warning", "⚠ ขาดข้อมูล", "กรุณาเลือกบัญชีปลายทาง");
    return false;
  }

  if (!amount || amount <= 0) {
    showNotification("warning", "⚠ ขาดข้อมูล", "กรุณากรอกจำนวนเงินที่ถูกต้อง");
    return false;
  }

 if (
  fromBankId === toBankId &&
  transferType === "โยกระหว่างบัญชี"
)

  if (!transferType) {
    showNotification("warning", "⚠ ขาดข้อมูล", "กรุณาเลือกประเภทรายการ");
    return false;
  }

  return true;
}

async function deleteTransfer(id){

    const confirmDelete =
    await Swal.fire({

        title:"ยืนยันการลบ ?",

        text:"คุณต้องการลบข้อมูลนี้",

        icon:"warning",

        showCancelButton:true,

        confirmButtonColor:"#ef4444",

        cancelButtonColor:"#64748b",

        confirmButtonText:"ลบข้อมูล",

        cancelButtonText:"ยกเลิก",

        background:"#1e293b",

        color:"#fff"

    });

    if(!confirmDelete.isConfirmed){

        return;

    }

    try{

        const response =
        await fetch(API_URL,{

            method:"DELETE",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                transfer_id:id

            })

        });

        const result =
        await response.json();

        if(result.success){

            showAlert(
                "success",
                "สำเร็จ",
                result.message
            );

            loadTransfers();

        }

    }catch(error){

        console.log(error);

    }

}
